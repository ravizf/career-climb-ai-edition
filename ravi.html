<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Climb: AI Snakes & Ladders</title>
    <!-- Tailwind CSS for rapid modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Styles for Glows and Animations */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* tailwind slate-900 */
            color: #f8fafc; /* tailwind slate-50 */
            overflow: hidden; /* Prevent scrolling for a clean app feel */
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(30, 41, 59, 0.7); /* slate-800 with opacity */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Board layout */
        #board-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 2px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15); /* Indigo glow */
        }

        /* Individual Cell */
        .cell {
            background-color: rgba(30, 41, 59, 0.9);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-size: 0.875rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        /* Alternate cell colors for checkerboard pattern */
        .cell:nth-child(even) { background-color: rgba(15, 23, 42, 0.8); }

        /* Highlight effects for cells with players */
        .cell.has-human {
            box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.5); /* Sky blue glow */
            border: 1px solid rgba(56, 189, 248, 0.8);
            color: rgba(56, 189, 248, 0.8);
        }
        .cell.has-ai {
            box-shadow: inset 0 0 15px rgba(244, 63, 94, 0.5); /* Rose red glow */
            border: 1px solid rgba(244, 63, 94, 0.8);
            color: rgba(244, 63, 94, 0.8);
        }
        /* If both are on the same cell */
        .cell.has-human.has-ai {
            box-shadow: inset 0 0 15px rgba(168, 85, 247, 0.5); /* Purple mix */
            border: 1px solid rgba(168, 85, 247, 0.8);
        }

        /* Player Tokens */
        .token {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            z-index: 20;
            transition: top 0.25s ease-in-out, left 0.25s ease-in-out; /* Smooth steps */
        }
        
        .token.human {
            background-color: #38bdf8;
            box-shadow: 0 0 10px #38bdf8, inset 0 0 5px white;
            /* Offset slightly if sharing a cell */
            transform: translate(-6px, -6px); 
        }

        .token.ai {
            background-color: #f43f5e;
            box-shadow: 0 0 10px #f43f5e, inset 0 0 5px white;
            transform: translate(6px, 6px);
        }

        /* SVG Overlay for Connections */
        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to cells */
            z-index: 5;
        }

        .ladder-line {
            stroke: #10b981; /* Emerald */
            stroke-width: 3;
            stroke-dasharray: 6, 4;
            opacity: 0.6;
            filter: drop-shadow(0 0 4px #10b981);
        }

        .snake-line {
            stroke: #e11d48; /* Rose */
            stroke-width: 4;
            fill: none;
            opacity: 0.6;
            filter: drop-shadow(0 0 4px #e11d48);
            stroke-linecap: round;
        }

        /* Dice Animation */
        @keyframes rollDiceAnim {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(0.9); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .rolling { animation: rollDiceAnim 0.5s ease-in-out; }

        /* Notification Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast { animation: slideIn 0.3s ease-out forwards; }

        /* Custom Scrollbar for logs */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <!-- Left Sidebar: Controls & Stats -->
    <aside class="w-full md:w-96 glass border-r border-slate-700 flex flex-col p-6 z-20 shadow-xl">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-500 mb-2">
                Career Climb
            </h1>
            <p class="text-slate-400 text-sm">AI Snakes & Ladders Edition</p>
        </div>

        <!-- Player Stats -->
        <div class="space-y-4 mb-8">
            <!-- Human Card -->
            <div id="human-card" class="p-4 rounded-xl border border-sky-500/30 bg-sky-500/10 transition-all duration-300">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-sky-400 shadow-[0_0_8px_#38bdf8]"></div>
                        You (Human)
                    </span>
                    <span id="human-pos" class="text-2xl font-black text-sky-400">1</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-1.5">
                    <div id="human-progress" class="bg-sky-400 h-1.5 rounded-full" style="width: 1%"></div>
                </div>
            </div>

            <!-- AI Card -->
            <div id="ai-card" class="p-4 rounded-xl border border-rose-500/10 bg-slate-800/50 transition-all duration-300">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold flex items-center gap-2 text-slate-300">
                        <div class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                        AI Bot
                    </span>
                    <span id="ai-pos" class="text-2xl font-black text-rose-500 opacity-70">1</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-1.5">
                    <div id="ai-progress" class="bg-rose-500 h-1.5 rounded-full opacity-70" style="width: 1%"></div>
                </div>
            </div>
        </div>

        <!-- Dice & Actions -->
        <div class="flex flex-col items-center mb-8">
            <div class="text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wider" id="turn-indicator">
                Your Turn
            </div>
            
            <div id="dice-container" class="w-24 h-24 bg-slate-800 rounded-2xl flex items-center justify-center text-4xl font-black border-2 border-slate-700 shadow-lg mb-4 text-white">
                🎲
            </div>

            <button id="roll-btn" class="w-full py-3 px-6 rounded-lg font-bold text-white bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 focus:ring-4 focus:ring-indigo-500/50 transition-all shadow-[0_0_15px_rgba(99,102,241,0.4)] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none relative overflow-hidden group">
                <span class="relative z-10">Roll Dice</span>
                <div class="absolute inset-0 h-full w-full bg-white/20 group-hover:scale-x-100 scale-x-0 transition-transform origin-left duration-300"></div>
            </button>
        </div>

        <!-- Event Log -->
        <div class="flex-1 flex flex-col min-h-[150px]">
            <h3 class="text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wider">Event Log</h3>
            <div id="log-container" class="flex-1 overflow-y-auto space-y-2 pr-2 text-sm">
                <div class="text-slate-500 italic">Game started. Good luck!</div>
            </div>
        </div>

        <!-- Reset Button -->
        <button id="reset-btn" class="mt-4 py-2 px-4 rounded border border-slate-600 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors text-sm">
            Reset Game
        </button>
    </aside>

    <!-- Right Main Area: The Board -->
    <main class="flex-1 flex items-center justify-center p-4 md:p-8 relative bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black">
        
        <!-- Toast Notification Area (Overlay) -->
        <div id="toast-container" class="absolute top-8 right-8 z-50 flex flex-col gap-3 pointer-events-none w-72"></div>

        <!-- The Game Board -->
        <div class="w-full max-w-2xl aspect-square relative" id="board-wrapper">
            <div id="board-container" class="w-full h-full">
                <!-- Cells generated by JS -->
            </div>
            
            <!-- SVG Layer for visual paths -->
            <svg id="svg-layer">
                <!-- Lines generated by JS -->
            </svg>

            <!-- Physical Player Tokens -->
            <div id="token-human" class="token human" style="top: 95%; left: 5%;"></div>
            <div id="token-ai" class="token ai" style="top: 95%; left: 5%;"></div>
        </div>

        <!-- Game Over Modal (Hidden by default) -->
        <div id="game-over-modal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center backdrop-blur-sm">
            <div class="glass p-8 rounded-2xl max-w-md w-full text-center border border-indigo-500/30 transform scale-95 transition-transform duration-300" id="modal-content">
                <h2 class="text-4xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-emerald-500" id="winner-title">Victory!</h2>
                <p class="text-lg text-slate-300 mb-8" id="winner-text">You reached the top of the corporate ladder!</p>
                <button onclick="resetGame()" class="w-full py-3 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-500 transition-colors shadow-lg">
                    Play Again
                </button>
            </div>
        </div>
    </main>

    <script>
        /**
         * Career Climb - Game Logic
         */

        // --- Configuration & Constants ---
        
        // 1. Ladders (Start -> End)
        const LADDERS = { 4: 22, 12: 35, 28: 55, 45: 75, 61: 88 };
        
        // 2. Snakes (Start -> End)
        const SNAKES = { 32: 10, 48: 26, 67: 43, 84: 59, 96: 72 };

        // 3. Career Events (Random Popups)
        const EVENTS = [
            { type: 'good', text: "Promotion! You skipped a level.", move: 3 },
            { type: 'good', text: "Stellar Performance Review.", move: 2 },
            { type: 'good', text: "Successful Networking Event.", move: 1 },
            { type: 'bad', text: "Major Project Failed.", move: -3 },
            { type: 'bad', text: "Severe Burnout.", move: -2 },
            { type: 'bad', text: "Missed Critical Deadline.", move: -1 }
        ];

        // --- State Variables ---
        let state = {
            humanPos: 1,
            aiPos: 1,
            currentPlayer: 'human', // 'human' or 'ai'
            isGameOver: false,
            isAnimating: false,
            boardMap: [] // Array of numbers mapping visual grid cells to 1-100 logic
        };

        // Audio Context for realistic sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // --- DOM Elements ---
        const els = {
            board: document.getElementById('board-container'),
            svgLayer: document.getElementById('svg-layer'),
            rollBtn: document.getElementById('roll-btn'),
            dice: document.getElementById('dice-container'),
            turnIndicator: document.getElementById('turn-indicator'),
            log: document.getElementById('log-container'),
            toastContainer: document.getElementById('toast-container'),
            resetBtn: document.getElementById('reset-btn'),
            modal: document.getElementById('game-over-modal'),
            modalContent: document.getElementById('modal-content'),
            humanPosText: document.getElementById('human-pos'),
            aiPosText: document.getElementById('ai-pos'),
            humanProgress: document.getElementById('human-progress'),
            aiProgress: document.getElementById('ai-progress'),
            humanCard: document.getElementById('human-card'),
            aiCard: document.getElementById('ai-card'),
            tokenHuman: document.getElementById('token-human'),
            tokenAi: document.getElementById('token-ai')
        };

        // --- Initialization ---

        function init() {
            generateBoardLayout();
            renderBoard();
            drawSnakesAndLadders();
            updateUI();
            
            // Handle window resize to redraw SVG lines correctly
            window.addEventListener('resize', () => {
                drawSnakesAndLadders();
                updateUI(); // Re-center tokens
            });
            els.rollBtn.addEventListener('click', handleHumanRoll);
            els.resetBtn.addEventListener('click', resetGame);
        }

        /**
         * Creates the Boustrophedon (zig-zag) numerical layout array.
         * Visually, DOM renders top-to-bottom, left-to-right.
         * Row 1 (top): 100 to 91
         * Row 2: 81 to 90
         * ...
         * Row 10 (bottom): 1 to 10
         */
        function generateBoardLayout() {
            state.boardMap = [];
            for (let row = 10; row >= 1; row--) {
                let rowNums = [];
                for (let col = 1; col <= 10; col++) {
                    rowNums.push((row - 1) * 10 + col);
                }
                // Alternate direction for even rows (10, 8, 6, 4, 2)
                if (row % 2 === 0) {
                    rowNums.reverse();
                }
                state.boardMap = state.boardMap.concat(rowNums);
            }
        }

        /**
         * Renders the HTML div cells for the board.
         */
        function renderBoard() {
            els.board.innerHTML = '';
            state.boardMap.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${num}`;
                
                // Add tiny markers for snakes/ladders start points
                let marker = num;
                if (LADDERS[num]) marker = `${num} 🪜`;
                if (SNAKES[num]) marker = `${num} 🐍`;
                
                cell.innerText = marker;
                els.board.appendChild(cell);
            });
        }

        /**
         * Calculates % based coordinates for SVG lines based on the grid layout.
         */
        function getCoordinateForNumber(num) {
            const index = state.boardMap.indexOf(num);
            if (index === -1) return { x: 0, y: 0 };
            
            // Grid is 10x10. Each cell is 10% width/height.
            const row = Math.floor(index / 10); // 0 to 9 (top to bottom)
            const col = index % 10; // 0 to 9 (left to right)
            
            // Center of the cell in percentages
            return {
                x: (col * 10) + 5,
                y: (row * 10) + 5
            };
        }

        /**
         * Draws responsive SVG lines for Snakes and Ladders over the board.
         */
        function drawSnakesAndLadders() {
            els.svgLayer.innerHTML = ''; // Clear existing
            
            // Draw Ladders (Straight dashed lines)
            for (const [start, end] of Object.entries(LADDERS)) {
                const pos1 = getCoordinateForNumber(parseInt(start));
                const pos2 = getCoordinateForNumber(end);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', `${pos1.x}%`);
                line.setAttribute('y1', `${pos1.y}%`);
                line.setAttribute('x2', `${pos2.x}%`);
                line.setAttribute('y2', `${pos2.y}%`);
                line.setAttribute('class', 'ladder-line');
                els.svgLayer.appendChild(line);
            }

            // Draw Snakes (Curved paths)
            for (const [start, end] of Object.entries(SNAKES)) {
                const pos1 = getCoordinateForNumber(parseInt(start));
                const pos2 = getCoordinateForNumber(end);
                
                // Calculate a control point for the Bezier curve to make it "snakey"
                // Bow out horizontally depending on relation
                const midX = (pos1.x + pos2.x) / 2;
                const midY = (pos1.y + pos2.y) / 2;
                const offsetX = 15; // Curve amount
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                // Q is quadratic bezier: Q controlX controlY, endX endY
                const d = `M ${pos1.x}% ${pos1.y}% Q ${midX + offsetX}% ${midY}% ${pos2.x}% ${pos2.y}%`;
                
                path.setAttribute('d', d);
                path.setAttribute('class', 'snake-line');
                els.svgLayer.appendChild(path);
            }
        }

        // --- Core Game Logic ---

        // Generate retro synthesizer sound effects
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'step') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'roll') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150 + Math.random()*200, now);
                gain.gain.setValueAtTime(0.02, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'ladder' || type === 'good') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'snake' || type === 'bad') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.4);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        async function handleHumanRoll() {
            if (state.currentPlayer !== 'human' || state.isAnimating || state.isGameOver) return;
            
            // Resume audio context on first user interaction
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            await executeTurn('human', 'ai');
        }

        async function aiTurn() {
            if (state.isGameOver) return;
            
            // Small delay to simulate AI "thinking"
            await sleep(1000); 
            await executeTurn('ai', 'human');
        }

        /**
         * Master function coordinating a single turn sequence.
         */
        async function executeTurn(player, nextPlayer) {
            state.isAnimating = true;
            els.rollBtn.disabled = true;

            // 1. Roll Dice with realistic animation and sound
            els.dice.classList.add('rolling');
            const roll = Math.floor(Math.random() * 6) + 1;
            const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            
            for (let i = 0; i < 10; i++) {
                els.dice.innerText = diceFaces[Math.floor(Math.random() * 6)];
                playSound('roll');
                await sleep(50);
            }
            
            els.dice.classList.remove('rolling');
            els.dice.innerText = diceFaces[roll - 1];
            playSound('ladder'); // little chime for roll finish
            await sleep(400); // Wait to show final face
            
            logEvent(`${player === 'human' ? 'You' : 'AI'} rolled a ${roll}.`, 'neutral');

            // 2. Calculate initial movement
            let currentPos = player === 'human' ? state.humanPos : state.aiPos;
            let newPos = currentPos + roll;
            
            // Bounce back rule if rolling past 100
            if (newPos > 100) {
                const excess = newPos - 100;
                newPos = 100 - excess;
                logEvent(`Bounced off 100! Moving to ${newPos}.`, 'neutral');
            }

            // Apply step-by-step move for realism
            await movePlayer(player, currentPos, newPos);

            // 3. Check Win Condition
            if (newPos === 100) {
                endGame(player);
                return;
            }

            // 4. Check Interactions (Snakes/Ladders/Events)
            await checkCellInteractions(player, newPos, nextPlayer);
        }

        /**
         * Simulates physical board movement step-by-step
         */
        async function movePlayer(player, fromPos, toPos) {
            let current = fromPos;
            let step = fromPos < toPos ? 1 : -1;
            
            while (current !== toPos) {
                current += step;
                updatePosition(player, current);
                updateUI();
                playSound('step');
                await sleep(250); // Delay matches CSS transition speed
            }
        }

        /**
         * Evaluates what happens when a player lands on a specific cell.
         */
        async function checkCellInteractions(player, pos, nextPlayer) {
            let finalPos = pos;
            let interactionOccurred = false;

            // Check Ladders
            if (LADDERS[pos]) {
                finalPos = LADDERS[pos];
                showToast("🪜 Ladder Found! Moving up.", "good");
                playSound('good');
                logEvent(`${player === 'human' ? 'You' : 'AI'} climbed a ladder to ${finalPos}.`, 'good');
                interactionOccurred = true;
            } 
            // Check Snakes
            else if (SNAKES[pos]) {
                finalPos = SNAKES[pos];
                showToast("🐍 Oh no, a Snake! Sliding down.", "bad");
                playSound('bad');
                logEvent(`${player === 'human' ? 'You' : 'AI'} slid down a snake to ${finalPos}.`, 'bad');
                interactionOccurred = true;
            }
            // Check Random Career Events (only if didn't hit snake/ladder)
            else if (Math.random() < 0.15) { // 15% chance
                const event = EVENTS[Math.floor(Math.random() * EVENTS.length)];
                finalPos = Math.max(1, Math.min(100, pos + event.move)); // Keep within bounds
                
                showToast(`💼 ${event.text}`, event.type);
                playSound(event.type);
                logEvent(`Event: ${event.text} (${event.move > 0 ? '+' : ''}${event.move} spaces)`, event.type);
                interactionOccurred = true;
            }

            // Apply secondary move if interaction happened
            if (interactionOccurred) {
                await sleep(800); // Pause to read toast
                await movePlayer(player, pos, finalPos);
                await sleep(200);
            }

            // Final win check after interactions
            if (finalPos === 100) {
                endGame(player);
                return;
            }

            // 5. Pass Turn
            state.currentPlayer = nextPlayer;
            state.isAnimating = false;
            updateTurnUI();

            if (state.currentPlayer === 'ai') {
                aiTurn();
            } else {
                els.rollBtn.disabled = false;
            }
        }

        // --- State Updaters ---

        function updatePosition(player, newPos) {
            if (player === 'human') state.humanPos = newPos;
            else state.aiPos = newPos;
        }

        function resetGame() {
            state.humanPos = 1;
            state.aiPos = 1;
            state.currentPlayer = 'human';
            state.isGameOver = false;
            state.isAnimating = false;
            
            els.log.innerHTML = '';
            els.dice.innerText = '🎲';
            els.modal.classList.add('hidden');
            
            logEvent("Game reset. New match started!", "neutral");
            updateUI();
            updateTurnUI();
        }

        function endGame(winner) {
            state.isGameOver = true;
            state.isAnimating = false;
            els.rollBtn.disabled = true;

            const isHuman = winner === 'human';
            
            els.modal.classList.remove('hidden');
            // Trigger animation
            setTimeout(() => {
                els.modalContent.classList.remove('scale-95');
                els.modalContent.classList.add('scale-100');
            }, 10);

            if (isHuman) {
                document.getElementById('winner-title').innerText = "Victory!";
                document.getElementById('winner-title').className = "text-4xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-emerald-500";
                document.getElementById('winner-text').innerText = "You reached the top of the corporate ladder before the AI!";
            } else {
                document.getElementById('winner-title').innerText = "Defeat!";
                document.getElementById('winner-title').className = "text-4xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-rose-600";
                document.getElementById('winner-text').innerText = "The AI out-climbed you. Time to upskill!";
            }
        }

        // --- Visual & UI Updaters ---

        function updateUI() {
            // Remove all existing cell highlights
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('has-human', 'has-ai');
            });

            // Add highlights to current cells
            const hCell = document.getElementById(`cell-${state.humanPos}`);
            const aCell = document.getElementById(`cell-${state.aiPos}`);
            
            if (hCell) hCell.classList.add('has-human');
            if (aCell) aCell.classList.add('has-ai');

            // Physically move the tokens using computed coordinates
            const hCoords = getCoordinateForNumber(state.humanPos);
            const aCoords = getCoordinateForNumber(state.aiPos);
            
            if (hCoords && hCoords.x !== 0) {
                els.tokenHuman.style.left = `calc(${hCoords.x}% - 10px)`;
                els.tokenHuman.style.top = `calc(${hCoords.y}% - 10px)`;
            }
            if (aCoords && aCoords.x !== 0) {
                els.tokenAi.style.left = `calc(${aCoords.x}% - 10px)`;
                els.tokenAi.style.top = `calc(${aCoords.y}% - 10px)`;
            }

            // Update stats text
            els.humanPosText.innerText = state.humanPos;
            els.aiPosText.innerText = state.aiPos;

            // Update progress bars
            els.humanProgress.style.width = `${state.humanPos}%`;
            els.aiProgress.style.width = `${state.aiPos}%`;
        }

        function updateTurnUI() {
            if (state.currentPlayer === 'human') {
                els.turnIndicator.innerText = "Your Turn";
                els.turnIndicator.classList.replace('text-rose-400', 'text-sky-400');
                
                // Highlight active card
                els.humanCard.classList.replace('border-sky-500/30', 'border-sky-400');
                els.humanCard.classList.replace('bg-sky-500/10', 'bg-sky-500/20');
                els.humanCard.classList.add('shadow-[0_0_15px_rgba(56,189,248,0.2)]');
                
                // Dim inactive card
                els.aiCard.classList.replace('border-rose-400', 'border-rose-500/10');
                els.aiCard.classList.replace('bg-rose-500/20', 'bg-slate-800/50');
                els.aiCard.classList.remove('shadow-[0_0_15px_rgba(244,63,94,0.2)]');
                els.aiPosText.classList.add('opacity-70');
                els.humanPosText.classList.remove('opacity-70');
                
                if(!state.isGameOver) els.rollBtn.disabled = false;
            } else {
                els.turnIndicator.innerText = "AI is thinking...";
                els.turnIndicator.classList.replace('text-sky-400', 'text-rose-400');
                
                // Highlight active card
                els.aiCard.classList.replace('border-rose-500/10', 'border-rose-400');
                els.aiCard.classList.replace('bg-slate-800/50', 'bg-rose-500/20');
                els.aiCard.classList.add('shadow-[0_0_15px_rgba(244,63,94,0.2)]');
                
                // Dim inactive card
                els.humanCard.classList.replace('border-sky-400', 'border-sky-500/30');
                els.humanCard.classList.replace('bg-sky-500/20', 'bg-sky-500/10');
                els.humanCard.classList.remove('shadow-[0_0_15px_rgba(56,189,248,0.2)]');
                els.humanPosText.classList.add('opacity-70');
                els.aiPosText.classList.remove('opacity-70');
                
                els.rollBtn.disabled = true;
            }
        }

        // --- Utilities ---

        function showToast(message, type = "neutral") {
            const toast = document.createElement('div');
            
            // Color logic based on type
            let bgClass = "bg-slate-800 border-slate-700";
            let textClass = "text-white";
            
            if (type === 'good') {
                bgClass = "bg-emerald-900/90 border-emerald-500/50";
                textClass = "text-emerald-100";
            } else if (type === 'bad') {
                bgClass = "bg-rose-900/90 border-rose-500/50";
                textClass = "text-rose-100";
            }

            toast.className = `toast ${bgClass} border p-4 rounded-xl shadow-2xl backdrop-blur-md flex items-center gap-3`;
            toast.innerHTML = `<span class="${textClass} font-semibold">${message}</span>`;
            
            els.toastContainer.appendChild(toast);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function logEvent(message, type) {
            const entry = document.createElement('div');
            
            let dotColor = "bg-slate-500";
            if (type === 'good') dotColor = "bg-emerald-500";
            if (type === 'bad') dotColor = "bg-rose-500";

            entry.className = "flex items-start gap-2 py-1 border-b border-slate-700/50 last:border-0 animation-fade-in";
            entry.innerHTML = `
                <div class="mt-1.5 w-2 h-2 rounded-full ${dotColor} flex-shrink-0"></div>
                <span class="text-slate-300">${message}</span>
            `;
            
            els.log.prepend(entry); // Add to top
            
            // Keep log manageable
            if (els.log.children.length > 20) {
                els.log.lastChild.remove();
            }
        }

        // Simple promise wrapper for timeouts to use with async/await
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // Start the game immediately
        init();

    </script>
</body>
